<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<title>Multipel regression i 3D</title>
<script src="https://cdn.plot.ly/plotly-3.5.0.min.js"></script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; color: #333; }
  h1 { font-size: 1.4em; margin-bottom: 4px; }
  p.sub { color: #666; margin-top: 0; font-size: 0.95em; }
  .controls { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
  button { font: inherit; padding: 10px 16px; border: 1px solid #ccc; border-radius: 6px; background: white; cursor: pointer; transition: all 0.15s; }
  button:hover { border-color: #2A6496; color: #2A6496; }
  button.active { background: #2A6496; border-color: #2A6496; color: white; font-weight: 600; }
  .stats { background: #f6f8fa; border: 1px solid #e1e4e8; border-radius: 6px; padding: 12px 16px; margin: 12px 0; font-family: "SF Mono", Consolas, monospace; font-size: 0.9em; }
  .stats strong { color: #2A6496; }
  .stats .eq { font-size: 1.05em; margin-bottom: 6px; }
  #plot { width: 100%; height: 600px; }
  .note { font-size: 0.85em; color: #888; margin-top: 8px; }
</style>
</head>
<body>
<h1>Multipel regression med två prediktorer</h1>
<p class="sub">Interaktiv 3D-visualisering. Rotera med musen. Röda streck = positiva residualer, blå = negativa.</p>

<div class="controls">
  <button id="btn-good" onclick="show('good')">Bra regression (hög R²)</button>
  <button id="btn-medium" onclick="show('medium')">Måttlig regression</button>
  <button id="btn-bad" onclick="show('bad')">Svag regression (låg R²)</button>
  <button id="btn-null" onclick="show('null')">Noll-effekt (bara brus)</button>
</div>

<div class="stats" id="stats"></div>

<div id="plot"></div>

<p class="note">SS<sub>tot</sub> = total varians i Y. SS<sub>res</sub> = oförklarad varians (summan av kvadrerade residualer). R² = 1 − SS<sub>res</sub>/SS<sub>tot</sub>.</p>

<script>
// ---------- Slumptalsgenerator med seed för reproducerbarhet ----------
function makeRNG(seed) {
  let s = seed;
  const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const randn = () => {
    let u = 0, v = 0;
    while (u === 0) u = rand();
    while (v === 0) v = rand();
    return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
  };
  return { rand, randn };
}

// ---------- Generera data för olika scenarier ----------
function generateScenario(type) {
  const n = 30;
  const { rand, randn } = makeRNG(42);
  const X1 = [], X2 = [], Y = [];

  let b0, b1, b2, noise, title, desc;
  if (type === 'good') {
    b0 = 1; b1 = 0.8; b2 = 0.3; noise = 0.5;
    title = "Bra regression — tydliga samband";
    desc = "Båda prediktorerna har genuina effekter. Residualerna är små.";
  } else if (type === 'medium') {
    b0 = 3; b1 = 0.4; b2 = 0.2; noise = 1.5;
    title = "Måttlig regression";
    desc = "Sambanden finns men är svagare, och residualerna är större.";
  } else if (type === 'bad') {
    b0 = 5; b1 = 0.15; b2 = 0.08; noise = 2.8;
    title = "Svag regression — mycket brus";
    desc = "Små lutningar drunknar i variationen. R² blir lågt.";
  } else { // null
    b0 = 7; b1 = 0.0; b2 = 0.0; noise = 2.5;
    title = "Noll-effekt — hög SStot men inget samband";
    desc = "Y varierar kraftigt men prediktorerna säger inget om var observationerna hamnar. Planet blir nästan platt.";
  }

  for (let i = 0; i < n; i++) {
    const x1 = 1 + rand() * 9;
    const x2 = 1 + rand() * 9;
    const y = b0 + b1 * x1 + b2 * x2 + noise * randn();
    X1.push(x1); X2.push(x2); Y.push(y);
  }
  return { X1, X2, Y, title, desc };
}

// ---------- OLS-lösning via 3×3-matrisinversion ----------
function fitOLS(X1, X2, Y) {
  const n = X1.length;
  let sX1 = 0, sX2 = 0, sY = 0;
  let sX1X1 = 0, sX2X2 = 0, sX1X2 = 0;
  let sX1Y = 0, sX2Y = 0;
  for (let i = 0; i < n; i++) {
    sX1 += X1[i]; sX2 += X2[i]; sY += Y[i];
    sX1X1 += X1[i]*X1[i]; sX2X2 += X2[i]*X2[i]; sX1X2 += X1[i]*X2[i];
    sX1Y += X1[i]*Y[i]; sX2Y += X2[i]*Y[i];
  }
  const A = [[n, sX1, sX2], [sX1, sX1X1, sX1X2], [sX2, sX1X2, sX2X2]];
  const b = [sY, sX1Y, sX2Y];
  const det = A[0][0]*(A[1][1]*A[2][2] - A[1][2]*A[2][1])
            - A[0][1]*(A[1][0]*A[2][2] - A[1][2]*A[2][0])
            + A[0][2]*(A[1][0]*A[2][1] - A[1][1]*A[2][0]);
  const inv = [
    [(A[1][1]*A[2][2] - A[1][2]*A[2][1])/det,
     -(A[0][1]*A[2][2] - A[0][2]*A[2][1])/det,
     (A[0][1]*A[1][2] - A[0][2]*A[1][1])/det],
    [-(A[1][0]*A[2][2] - A[1][2]*A[2][0])/det,
     (A[0][0]*A[2][2] - A[0][2]*A[2][0])/det,
     -(A[0][0]*A[1][2] - A[0][2]*A[1][0])/det],
    [(A[1][0]*A[2][1] - A[1][1]*A[2][0])/det,
     -(A[0][0]*A[2][1] - A[0][1]*A[2][0])/det,
     (A[0][0]*A[1][1] - A[0][1]*A[1][0])/det]
  ];
  return [
    inv[0][0]*b[0] + inv[0][1]*b[1] + inv[0][2]*b[2],
    inv[1][0]*b[0] + inv[1][1]*b[1] + inv[1][2]*b[2],
    inv[2][0]*b[0] + inv[2][1]*b[1] + inv[2][2]*b[2]
  ];
}

// ---------- Huvudfunktion ----------
function show(type) {
  document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + type).classList.add('active');

  const { X1, X2, Y, title, desc } = generateScenario(type);
  const [b0, b1, b2] = fitOLS(X1, X2, Y);

  // Predikterade värden och residualer
  const yhat = X1.map((x1, i) => b0 + b1 * x1 + b2 * X2[i]);
  const resid = Y.map((y, i) => y - yhat[i]);
  const meanY = Y.reduce((a, v) => a + v, 0) / Y.length;
  const SStot = Y.reduce((a, y) => a + (y - meanY) ** 2, 0);
  const SSres = resid.reduce((a, r) => a + r ** 2, 0);
  const R2 = 1 - SSres / SStot;

  // Uppdatera statistikruta
  document.getElementById('stats').innerHTML = `
    <div class="eq">Ŷ = <strong>${b0.toFixed(2)}</strong>
      + <strong>${b1.toFixed(2)}</strong> · X₁
      + <strong>${b2.toFixed(2)}</strong> · X₂</div>
    <div>R² = <strong>${R2.toFixed(3)}</strong>
      &nbsp;|&nbsp; SS<sub>tot</sub> = ${SStot.toFixed(1)}
      &nbsp;|&nbsp; SS<sub>res</sub> = ${SSres.toFixed(1)}
      &nbsp;|&nbsp; n = ${Y.length}</div>
    <div style="margin-top:6px; color:#666; font-family: system-ui;">${desc}</div>
  `;

  // Bygg regressionsplan (rutnät 20×20 över data)
  const gridSize = 20;
  const x1min = Math.min(...X1), x1max = Math.max(...X1);
  const x2min = Math.min(...X2), x2max = Math.max(...X2);
  const planeX = [], planeY = [], planeZ = [];
  for (let i = 0; i < gridSize; i++) {
    const rowX = [], rowY = [], rowZ = [];
    for (let j = 0; j < gridSize; j++) {
      const xa = x1min + (x1max - x1min) * j / (gridSize - 1);
      const xb = x2min + (x2max - x2min) * i / (gridSize - 1);
      rowX.push(xa); rowY.push(xb); rowZ.push(b0 + b1 * xa + b2 * xb);
    }
    planeX.push(rowX); planeY.push(rowY); planeZ.push(rowZ);
  }

  // Residualstreck (färgade efter tecken)
  const residualTraces = X1.map((x1, i) => ({
    type: 'scatter3d', mode: 'lines',
    x: [x1, x1], y: [X2[i], X2[i]], z: [Y[i], yhat[i]],
    line: { color: resid[i] >= 0 ? '#e74c3c' : '#3498db', width: 4 },
    hoverinfo: 'skip', showlegend: false
  }));

  const traces = [
    {
      type: 'surface', x: planeX, y: planeY, z: planeZ,
      colorscale: [[0, '#3498db'], [1, '#2c3e50']],
      opacity: 0.35, showscale: false, name: 'Regressionsplan',
      hovertemplate: 'X₁: %{x:.1f}<br>X₂: %{y:.1f}<br>Ŷ: %{z:.1f}<extra>Regressionsplan</extra>'
    },
    ...residualTraces,
    {
      type: 'scatter3d', mode: 'markers',
      x: X1, y: X2, z: yhat,
      marker: { color: '#95a5a6', size: 4, symbol: 'diamond' },
      name: 'Prediktioner (Ŷ)',
      hovertemplate: 'X₁: %{x:.1f}<br>X₂: %{y:.1f}<br>Ŷ: %{z:.1f}<extra></extra>'
    },
    {
      type: 'scatter3d', mode: 'markers',
      x: X1, y: X2, z: Y,
      marker: { color: '#2c3e50', size: 6, line: { color: 'white', width: 1 } },
      name: 'Observationer (Y)',
      hovertemplate: 'X₁: %{x:.1f}<br>X₂: %{y:.1f}<br>Y: %{z:.1f}<extra></extra>'
    }
  ];

  const layout = {
    title: { text: `${title} &mdash; R² = ${R2.toFixed(3)}`, font: { size: 15 } },
    scene: {
      camera: { eye: { x: 1.8, y: -1.5, z: 0.9 } },
      xaxis: { title: { text: 'Prediktor 1 (X₁)' }, backgroundcolor: '#fafafa', gridcolor: '#ddd' },
      yaxis: { title: { text: 'Prediktor 2 (X₂)' }, backgroundcolor: '#fafafa', gridcolor: '#ddd' },
      zaxis: { title: { text: 'Utfall (Y)' }, backgroundcolor: '#fafafa', gridcolor: '#ddd' }
    },
    legend: { x: 0.02, y: 0.98, bgcolor: 'rgba(255,255,255,0.8)' },
    margin: { l: 0, r: 0, t: 50, b: 0 }
  };

  Plotly.react('plot', traces, layout, { responsive: true });
}

// Starta med "bra regression"
show('good');
</script>
</body>
</html>
